<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c2d5a"/>
      <stop offset="100%" style="stop-color:#1a6fc4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle pattern overlay -->
  <circle cx="1050" cy="100" r="300" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="80"/>
  <circle cx="1050" cy="100" r="200" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>
  <circle cx="150" cy="530" r="250" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="60"/>

  <!-- Logo icon -->
  <g transform="translate(480, 155)">
    <rect x="0" y="0" width="168" height="136" rx="12" fill="rgba(255,255,255,0.15)"/>
    <rect x="0" y="0" width="168" height="136" rx="12" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
    <circle cx="0" cy="68" r="14" fill="#ffffff"/>
    <circle cx="168" cy="68" r="14" fill="#ffffff"/>
    <line x1="0" y1="68" x2="168" y2="68" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6 5"/>
    <rect x="22" y="22" width="80" height="5" rx="2.5" fill="rgba(255,255,255,0.9)"/>
    <rect x="22" y="36" width="55" height="5" rx="2.5" fill="rgba(255,255,255,0.6)"/>
    <polygon points="148,-2 151,7 161,7 153,13 156,23 148,17.5 140,23 143,13 135,7 145,7" fill="#ffffff" transform="translate(0, 38)"/>
    <rect x="22" y="88" width="45" height="4" rx="2" fill="rgba(255,255,255,0.5)"/>
    <rect x="22" y="100" width="65" height="4" rx="2" fill="rgba(255,255,255,0.35)"/>
    <rect x="22" y="110" width="36" height="4" rx="2" fill="rgba(255,255,255,0.25)"/>
  </g>

  <!-- TicketScout wordmark -->
  <text x="600" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="86" fill="#ffffff" text-anchor="middle" letter-spacing="-2">TicketScout</text>

  <!-- Tagline -->
  <text x="600" y="410" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="24" fill="rgba(255,255,255,0.7)" text-anchor="middle" letter-spacing="6">compare. save. enjoy.</text>

  <!-- Bottom descriptor -->
  <text x="600" y="510" font-family="'Helvetica Neue', Arial, sans-serif" font-weight="400" font-size="28" fill="rgba(255,255,255,0.5)" text-anchor="middle">Compare ticket prices across verified sellers</text>
</svg>
