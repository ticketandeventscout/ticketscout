  <meta property="og:type" content="website" />

  <!-- Event schema markup — populated by JS -->

  <style>
    .artist-hero { background: linear-gradient(135deg, #0c2d5a 0%, #1a6fc4 100%); padding: 52px 24px 44px; text-align: center; position: relative; overflow: visible; }
    .artist-hero-inner { position: relative; z-index: 2; max-width: 700px; margin: 0 auto; }
    .artist-hero h1 { color: #fff; font-size: 34px; font-weight: 600; margin: 10px 0 0; line-height: 1.25; }
    .artist-genre-badge { display: inline-block; background: rgba(255,255,255,0.18); color: #fff; font-size: 12px; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 5px 12px; border-radius: 20px; }
    .sports-wrap { max-width: 900px; margin: 0 auto; padding: 28px 16px 48px; }
    .events-loading { padding: 28px; text-align: center; color: #666; }
    .event-list-item { display: flex; align-items: center; justify-content: space-between; gap: 16px; background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; text-decoration: none; color: inherit; transition: border-color .15s, box-shadow .15s; }
    .event-list-item:hover { border-color: #1a6fc4; box-shadow: 0 2px 10px rgba(12,45,90,.08); }
    .event-list-name { font-size: 16px; font-weight: 600; color: #1a1a1a; margin-bottom: 4px; }
    .event-list-meta { font-size: 13px; color: #666; }
    .event-list-right { text-align: right; white-space: nowrap; }
    .event-list-price { font-size: 16px; font-weight: 700; color: #0c2d5a; }
    .event-list-cta { font-size: 13px; color: #1a6fc4; font-weight: 600; }
    .genre-pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
    .genre-pill { display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 1px solid #d8dde3; border-radius: 20px; padding: 7px 14px; font-size: 13px; font-weight: 600; color: #0c2d5a; cursor: pointer; font-family: inherit; transition: background .15s, border-color .15s, color .15s; }
    .genre-pill:hover { border-color: #1a6fc4; }
    .genre-pill.is-active { background: #1a6fc4; border-color: #1a6fc4; color: #fff; }
    .genre-count { background: rgba(12,45,90,.09); border-radius: 10px; padding: 1px 7px; font-size: 11px; font-weight: 700; }
    .genre-pill.is-active .genre-count { background: rgba(255,255,255,.24); color: #fff; }
    .genre-heading { font-size: 15px; font-weight: 600; color: #0c2d5a; margin: 22px 0 10px; display: flex; align-items: center; gap: 8px; }
    .genre-count-inline { font-size: 11px; font-weight: 700; color: #7c8794; background: #eef1f4; border-radius: 10px; padding: 1px 7px; }
    .hub-note { margin-top: 18px; font-size: 12px; color: #9aa4ae; }
    .hub-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(190px, 1fr)); gap: 10px; }
    .hub-item { display: block; background: #fff; border: 1px solid #e0e0e0; border-radius: 10px; padding: 12px 14px; text-decoration: none; color: #0c2d5a; font-size: 14px; font-weight: 600; transition: border-color .15s, box-shadow .15s; }
    .hub-item:hover { border-color: #1a6fc4; box-shadow: 0 2px 8px rgba(12,45,90,.08); }
    .about-section { margin-top: 34px; }
    .about-section h2 { font-size: 20px; color: #0c2d5a; margin-bottom: 10px; }
    .about-section p { font-size: 15px; line-height: 1.65; color: #444; }
    @media (max-width: 600px) {
      .artist-hero h1 { font-size: 26px; }
      .event-list-item { flex-direction: column; align-items: flex-start; }
      .event-list-right { text-align: left; }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
        <svg width="36" height="36" viewBox="0 40 248 200" xmlns="http://www.w3.org/2000/svg">
          <rect x="40" y="72" width="168" height="136" rx="12" fill="#1a6fc4"/>
          <circle cx="40" cy="140" r="16" fill="#ffffff"/>
          <circle cx="208" cy="140" r="16" fill="#ffffff"/>
          <line x1="40" y1="140" x2="208" y2="140" stroke="#ffffff" stroke-width="2" stroke-dasharray="6 5" opacity="0.5"/>
          <rect x="62" y="92" width="88" height="6" rx="3" fill="#ffffff" opacity="0.9"/>
          <rect x="62" y="106" width="60" height="6" rx="3" fill="#ffffff" opacity="0.6"/>
          <g transform="translate(168, 112)">
            <polygon points="0,-14 3.5,-5 13,-5 5.5,1 8.5,11 0,5.5 -8.5,11 -5.5,1 -13,-5 -3.5,-5" fill="#ffffff" opacity="0.95"/>
          </g>
          <rect x="62" y="158" width="50" height="5" rx="2.5" fill="#ffffff" opacity="0.5"/>
          <rect x="62" y="170" width="72" height="5" rx="2.5" fill="#ffffff" opacity="0.35"/>
          <rect x="62" y="182" width="40" height="5" rx="2.5" fill="#ffffff" opacity="0.25"/>
        </svg>
        <div style="display:flex; flex-direction:column; justify-content:center; line-height:1.2;">
          <span style="font-family:'Inter','Helvetica Neue',Arial,sans-serif; font-weight:700; font-size:22px; color:#0c2d5a; letter-spacing:-0.5px;">TicketScout</span>
          <span style="font-family:'Inter','Helvetica Neue',Arial,sans-serif; font-weight:400; font-size:11px; color:#1a6fc4; letter-spacing:2px;">compare. save. enjoy.</span>
        </div>
      </a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/?cat=music">Concerts</a>
        <a href="/theatre">Theatre</a>
        <a href="/sports">Sports</a>
        <a href="/?cat=comedy">Comedy</a>
        <a href="/football">Football</a>
      </div>
    </div>
  </nav>

  <section class="artist-hero">
    <div class="artist-hero-inner">
      <div class="artist-genre-badge" id="genre-badge">Loading…</div>
      <h1 id="artist-name">Sports Tickets</h1>
    </div>
  </section>

  <main class="sports-wrap">
    <nav class="breadcrumb" id="breadcrumb" aria-label="Breadcrumb"></nav>

    <h2 id="events-heading" style="font-size:20px;color:#0c2d5a;margin:18px 0 14px;">Upcoming events</h2>
    <div id="events-container">
      <div class="events-loading">Loading upcoming events…</div>
    </div>

    <div id="hotel-container"></div>

    <section class="about-section">
      <h2 id="about-heading">About</h2>
      <p id="about-text"></p>
    </section>
  </main>

  <script>
  (function () {
    'use strict';

    var slug = window.__SPORTS_SLUG__ || '';

    // Phase 1.4B — event slug builder. MUST MATCH the copies in compare.js,
    // concert.html, football.html and the server capture files. FROZEN v1 —
    // never change without migrating every indexed /event/ URL.
    function tsEventSlug(category, date, name) {
      if (!category || !date || !name) return null;
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date)) return null;
      var norm = String(name).toLowerCase()
        .normalize('NFD').replace(/[\u0300-\u036f]/g, '')
        .replace(/&/g, ' and ')
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '')
        .slice(0, 80).replace(/-+$/g, '');
      return norm ? category + '-' + date + '-' + norm : null;
    }

    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) {
        return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c];
      });
    }

    function fmtDate(iso) {
      if (!iso) return '';
      var d = new Date(iso + 'T00:00:00Z');
      if (isNaN(d)) return '';
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    function safeJson(r) {
      if (!r || !r.ok) return null;
      var ct = r.headers.get('content-type') || '';
      if (ct.indexOf('application/json') === -1) return null;
      return r.json().catch(function () { return null; });
    }

    async function init() {
      // Hub mode (/sports with no slug): list the sports entities we hold,
      // so the section is browsable and internally linked rather than a
      // dead end that Google sees as a thin page.
      if (!slug) {
        document.getElementById('genre-badge').textContent = 'Sports';
        document.getElementById('artist-name').textContent = 'Sports Tickets';
        document.getElementById('events-heading').textContent = 'Browse by team or competitor';
        document.getElementById('about-heading').textContent = 'About sports tickets on TicketScout';
        document.getElementById('about-text').textContent =
          'We compare ticket prices for basketball, ice hockey, boxing, MMA, tennis, ' +
          'rugby, cricket and more across verified resale sellers, so you can see the ' +
          'real get-in price for an event before you buy. Football has its own section.';
        document.getElementById('breadcrumb').innerHTML =
          '<a href="/">Home</a> › Sports';
        var box = document.getElementById('events-container');
        try {
          var lr = await fetch('/api/sports?list=1');
          var ld = await lr.json();
          if (ld && ld.entities && ld.entities.length) {
            renderHub(box, ld);
          } else {
            box.innerHTML = '<div class="events-loading">Sports pages are being added — ' +
              'check back shortly, or <a href="/">search from the home page</a>.</div>';
          }
        } catch (e) {
          box.innerHTML = '<div class="events-loading">Couldn\'t load the sports list. ' +
            '<a href="/">Search from the home page</a>.</div>';
        }
        return;
      }

      var entity;
      try {
        var r = await fetch('/api/sports?slug=' + encodeURIComponent(slug));
        entity = await r.json();
      } catch (e) {
        document.getElementById('events-container').innerHTML =
          '<div class="events-loading">Couldn\'t load this page. Please try again.</div>';
        return;
      }

      // Head + hero.
      // Stub pages (/sports/{slug}) load only the BODY of this template into
      // a page that already has its own <head>. So every element that lives
      // in THIS file's head — page-title, canonical, the og:* tags — is null
      // there. Writing to it unguarded threw before init finished and left
      // the page stuck on "LOADING...". setAttr already guards; the title
      // needs the same treatment, and document.title works either way.
      var title = entity.name + ' Tickets | TicketScout';
      document.title = title;
      var _pt = document.getElementById('page-title');
      if (_pt) _pt.textContent = title;
      document.getElementById('artist-name').textContent = entity.name + ' Tickets';
      document.getElementById('genre-badge').textContent = entity.genre || 'Sport';
      document.getElementById('about-heading').textContent = 'About ' + entity.name;
      document.getElementById('about-text').textContent = entity.description || '';
      var canonical = 'https://ticketscout.co.uk/sports/' + slug;
      setAttr('canonical', 'href', canonical);
      setAttr('og-url', 'content', canonical);
      setAttr('og-title', 'content', title);
      if (entity.description) {
        setAttr('meta-description', 'content', entity.description);
        setAttr('og-description', 'content', entity.description);
      }

      // A page whose entity isn't registered is a thin page we can't vouch
      // for — don't invite Google to index it.
      if (entity.found === false) {
        var m = document.createElement('meta');
        m.name = 'robots'; m.content = 'noindex, follow';
        document.head.appendChild(m);
      }

      document.getElementById('breadcrumb').innerHTML =
        '<a href="/">Home</a> › <a href="/sports">Sports</a> › ' + esc(entity.name);

      await loadEvents(entity);
    }

    function setAttr(id, attr, val) {
      var el = document.getElementById(id);
      if (el) el.setAttribute(attr, val);
    }

    async function loadEvents(entity) {
      var q = encodeURIComponent(entity.search || entity.name);
      var results = await Promise.all([
        fetch('/api/ticketmaster?keyword=' + q + '&size=40').then(safeJson).catch(function () { return null; }),
        fetch('/api/awin-events?name=' + q + '&size=40&cat=sports').then(safeJson).catch(function () { return null; }),
        fetch('/api/sportsevents365?q=' + q + '&mode=list&cat=sports&slug=' + encodeURIComponent(entity.slug)).then(safeJson).catch(function () { return null; })
      ]);

      var tm = results[0], awin = results[1], se = results[2];
      var events = [];

      // Ticketmaster
      var tmList = (tm && tm._embedded && tm._embedded.events) || [];
      tmList.forEach(function (e) { events.push(normaliseTm(e)); });

      // Awin
      var awinList = (awin && awin.events) || [];
      awinList.forEach(function (e) {
        events.push({
          name: e.name || e.eventName || '',
          date: e.date || e.eventDate || '',
          venue: e.venue || '', city: e.city || '',
          price: e.price != null ? e.price : null,
          merchant: e.merchant || 'Gigsberg', kind: 'awin'
        });
      });

      // SportsEvents365
      var seList = (se && se.matches) || (se && se.events) || [];
      seList.forEach(function (e) {
        var d = e.date || '';
        // SE365 returns dd/mm/yyyy — normalise to ISO for the slug builder.
        var parts = String(d).split('/');
        var iso = parts.length === 3 ? parts[2] + '-' + parts[1] + '-' + parts[0] : d;
        events.push({
          name: e.name || '', date: iso,
          venue: e.venue || '', city: e.city || '',
          price: e.price != null ? e.price : null,
          merchant: 'SportsEvents365', kind: 'se365'
        });
      });

      renderEvents(dedupe(events), entity);
    }

    function normaliseTm(e) {
      var v = e._embedded && e._embedded.venues && e._embedded.venues[0];
      return {
        name: e.name || '',
        date: (e.dates && e.dates.start && e.dates.start.localDate) || '',
        time: (e.dates && e.dates.start && e.dates.start.localTime) || '',
        venue: (v && v.name) || '',
        city: (v && v.city && v.city.name) || '',
        price: (e.priceRanges && e.priceRanges[0] && e.priceRanges[0].min) != null
          ? e.priceRanges[0].min : null,
        merchant: '', kind: 'tm'
      };
    }

    // Deliberately simpler than football.html's dedup: no fixture splitting or
    // club-suffix stripping. Sports entities here are individuals (fighters,
    // players) and single-name clubs, so the two-sided-fixture normalisation
    // that football needs doesn't apply and would misfire on names like
    // "Alex Pereira vs Jiri Prochazka" being genuinely distinct bouts.
    function dedupe(list) {
      var seen = {}, out = [];
      list.forEach(function (e) {
        if (!e.name) return;
        var key = e.name.toLowerCase().replace(/[^a-z0-9]/g, '') + '|' + (e.date || '');
        if (seen[key]) {
          // Keep the cheaper of two identical listings.
          var prev = out[seen[key].idx];
          if (e.price != null && (prev.price == null || e.price < prev.price)) prev.price = e.price;
          return;
        }
        seen[key] = { idx: out.length };
        out.push(e);
      });
      return out.sort(function (a, b) {
        return (a.date || '9999') < (b.date || '9999') ? -1 : (a.date || '9999') > (b.date || '9999') ? 1 : 0;
      });
    }

    function renderEvents(events, entity) {
      var box = document.getElementById('events-container');
      if (!events.length) {
        box.innerHTML = '<div class="events-loading">No upcoming ' + esc(entity.name) +
          ' events listed right now. Check back soon — we update daily.</div>';
        updateSchema([], entity);
        return;
      }

      box.innerHTML = events.map(function (e) {
        var loc = [e.venue, e.city].filter(Boolean).join(' · ');
        var meta = [loc, fmtDate(e.date)].filter(Boolean).join(' · ');
        var priceHtml = e.price != null
          ? '<div class="event-list-price">From £' + Math.round(e.price) + '</div>' : '';
        var ssr = tsEventSlug('sports', e.date, e.name);
        var href = ssr ? '/event/' + ssr : '/#/event/sports-' + encodeURIComponent(e.name);
        var via = e.merchant
          ? ' <span style="font-size:10px;color:#888;margin-left:6px;">via ' + esc(e.merchant) + '</span>' : '';
        return '<a class="event-list-item" href="' + href + '">' +
            '<div class="event-list-left">' +
              '<div class="event-list-name">' + esc(e.name) + via + '</div>' +
              (meta ? '<div class="event-list-meta">' + esc(meta) + '</div>' : '') +
            '</div>' +
            '<div class="event-list-right">' + priceHtml +
              '<span class="event-list-cta">Compare prices →</span></div>' +
          '</a>';
      }).join('');

      updateSchema(events, entity);

      // Hotel card, anchored on the soonest event with a city.
      var first = events.filter(function (e) { return e.city && e.date; })[0];
      if (first && typeof renderHotelCard === 'function') {
        try { renderHotelCard(document.getElementById('hotel-container'), first.city, first.date, first.venue); } catch (e) {}
      }
    }

    // Only DATED events go into the graph. Same guard as the other templates:
    // a synthetic or dateless card previously emitted startDate:"" and tripped
    // the GSC "Missing field 'startDate'" critical.
    function updateSchema(events, entity) {
      var dated = events.filter(function (e) { return /^\d{4}-\d{2}-\d{2}/.test(e.date || ''); });
      var el = document.getElementById('schema-org');
      if (!el) return;
      if (!dated.length) { el.textContent = ''; return; }

      var nodes = dated.slice(0, 5).map(function (e) {
        var node = {
          '@type': 'SportsEvent',
          'name': e.name,
          'startDate': e.date,
          'eventStatus': 'https://schema.org/EventScheduled',
          'eventAttendanceMode': 'https://schema.org/OfflineEventAttendanceMode',
          'url': 'https://ticketscout.co.uk/sports/' + slug
        };
        if (e.venue) {
          node.location = {
            '@type': 'Place',
            'name': e.venue,
            'address': e.city ? { '@type': 'PostalAddress', 'addressLocality': e.city } : undefined
          };
        }
        if (e.price != null) {
          node.offers = {
            '@type': 'Offer',
            'price': Math.round(e.price),
            'priceCurrency': 'GBP',
            'availability': 'https://schema.org/InStock',
            'url': 'https://ticketscout.co.uk/sports/' + slug
          };
        }
        return node;
      });

      el.textContent = JSON.stringify({ '@context': 'https://schema.org', '@graph': nodes });
    }


    // Hub rendering: genre pills filter the grid in place. Genres come from
    // the API (which counts them from the real KV records), so the pills can
    // never advertise a genre with nothing behind it.
    var _hubData = null;
    var _hubFilter = 'all';

    function renderHub(box, data) {
      _hubData = data;
      var pills = '<div class="genre-pills">' +
        '<button class="genre-pill is-active" data-g="all">All' +
          '<span class="genre-count">' + data.count + '</span></button>' +
        data.genres.map(function (g) {
          return '<button class="genre-pill" data-g="' + phAttr(g.genre) + '">' +
            esc(g.genre) + '<span class="genre-count">' + g.count + '</span></button>';
        }).join('') + '</div>';

      box.innerHTML = pills + '<div id="hub-results"></div>' +
        (data.truncated
          ? '<div class="hub-note">Showing the first ' + data.count + ' of ' +
            data.totalRegistered + ' — the rest are in the sitemap.</div>'
          : '');

      box.querySelectorAll('.genre-pill').forEach(function (btn) {
        btn.addEventListener('click', function () {
          box.querySelectorAll('.genre-pill').forEach(function (b) { b.classList.remove('is-active'); });
          btn.classList.add('is-active');
          _hubFilter = btn.getAttribute('data-g');
          paintHub();
        });
      });
      paintHub();
    }

    function paintHub() {
      var el = document.getElementById('hub-results');
      if (!el || !_hubData) return;
      var items = _hubFilter === 'all'
        ? _hubData.entities
        : _hubData.entities.filter(function (e) { return e.genre === _hubFilter; });

      if (!items.length) { el.innerHTML = '<div class="events-loading">Nothing here yet.</div>'; return; }

      // Grouped by genre when showing everything, flat when filtered —
      // headings would be noise once a single genre is selected.
      if (_hubFilter === 'all') {
        var groups = {};
        items.forEach(function (e) { (groups[e.genre] = groups[e.genre] || []).push(e); });
        el.innerHTML = _hubData.genres.map(function (g) {
          var list = groups[g.genre];
          if (!list || !list.length) return '';
          return '<h3 class="genre-heading">' + esc(g.genre) +
            ' <span class="genre-count-inline">' + list.length + '</span></h3>' + grid(list);
        }).join('');
      } else {
        el.innerHTML = grid(items);
      }
    }

    function grid(list) {
      return '<div class="hub-grid">' + list.map(function (e) {
        return '<a class="hub-item" href="' + e.url + '">' + esc(e.name) + '</a>';
      }).join('') + '</div>';
    }

    function phAttr(s) { return String(s == null ? '' : s).replace(/"/g, '&quot;'); }

    init();
  })();
  </script>
  <script src="/events.js" defer></script>
  <script src="/autocomplete.js" defer></script>
</body>
</html>
