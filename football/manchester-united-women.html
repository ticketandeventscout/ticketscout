<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Manchester United Women Tickets | TicketScout</title>
<script>window.__FOOTBALL_SLUG__='manchester-united-women';</script>
<link rel="stylesheet" href="/styles.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head><body><script>
var x=new XMLHttpRequest();
x.open('GET','/football.html',true);
x.onload=function(){
  if(x.status!==200)return;
  var d=new DOMParser().parseFromString(x.responseText,'text/html');
  document.head.querySelectorAll('script').forEach(function(s){s.remove();});
  d.head.querySelectorAll('link,style').forEach(function(el){document.head.appendChild(document.adoptNode(el));});
  document.body.innerHTML=d.body.innerHTML;
  document.body.querySelectorAll('script').forEach(function(o){
    var s=document.createElement('script');
    if(o.src){s.src=o.src;}else{s.textContent=o.textContent;}
    document.body.appendChild(s);o.remove();
  });
};
x.send();
</script></body></html>
