<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tottenham Hotspur Tickets — Compare Prices | TicketScout</title>
  <meta name="description" content="Compare Tottenham Hotspur ticket prices across verified sellers. Find the cheapest Tottenham Hotspur match tickets." />
  <link rel="canonical" href="https://www.ticketscout.co.uk/football/tottenham" />
  <script>window.__FOOTBALL_SLUG__ = 'tottenham';</script>
  <link rel="stylesheet" href="/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
<script>
(async function() {
  try {
    const r = await fetch('/football.html');
    const html = await r.text();
    const m = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
    if (!m) return;
    document.body.innerHTML = m[1];
    document.body.querySelectorAll('script').forEach(function(o) {
      var s = document.createElement('script');
      if (o.src) { s.src = o.src; s.async = false; } else { s.textContent = o.textContent; }
      document.head.appendChild(s);
      o.remove();
    });
  } catch(e) { console.error('Template load failed', e); }
})();
</script>
</body>
</html>
