name: Refresh Vivid Seats Feed

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Download Vivid Seats feed via FTP
        env:
          FTP_USER: ${{ secrets.IMPACT_FTP_USER }}
          FTP_PASS: ${{ secrets.IMPACT_FTP_PASS }}
        run: |
          mkdir -p public
          # Write credentials to .netrc for safer handling of special characters
          echo "machine products.impact.com login ${FTP_USER} password ${FTP_PASS}" > ~/.netrc
          chmod 600 ~/.netrc
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:passive-mode yes;
            set net:timeout 120;
            set net:max-retries 3;
            open products.impact.com;
            get /Vivid-Seats/Ticket-Feed_CUSTOM.csv.gz -o public/vividseats-feed.csv.gz;
            bye
          "
          rm -f ~/.netrc
          echo "Result: $(du -h public/vividseats-feed.csv.gz 2>/dev/null || echo 'FILE NOT FOUND')"

      - name: Verify download
        run: |
          if [ ! -f public/vividseats-feed.csv.gz ]; then
            echo "ERROR: Feed file missing after download attempt"
            exit 1
          fi
          SIZE=$(stat -c%s public/vividseats-feed.csv.gz)
          echo "File size: ${SIZE} bytes"
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small — download likely failed"
            cat public/vividseats-feed.csv.gz  # show error message if any
            exit 1
          fi
          echo "Feed file OK: $(du -h public/vividseats-feed.csv.gz | cut -f1)"

      - name: Commit updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vividseats-feed.csv.gz
          if git diff --staged --quiet; then
            echo "Feed unchanged — no commit needed"
          else
            git commit -m "chore: refresh Vivid Seats feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Rebuild Cloudflare KV cache
        env:
          CACHE_URL: ${{ secrets.CLOUDFLARE_CACHE_URL }}
        run: |
          RESPONSE=$(curl -s --max-time 60 "$CACHE_URL")
          echo "Cache response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "Cache rebuilt successfully"
          else
            echo "WARNING: Unexpected cache response"
          fi
