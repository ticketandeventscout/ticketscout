# ===========================
# GitHub Action: Vivid Seats Feed Refresh
# Downloads Vivid Seats catalog CSV from Impact FTP every 6 hours,
# commits to public/vividseats-feed.csv.gz, triggers Cloudflare KV rebuild.
#
# Secrets required (GitHub repo → Settings → Secrets → Actions):
#   IMPACT_FTP_USER      — ps-ftp_7443544
#   IMPACT_FTP_PASS      — (password from Impact FTP email)
#   CLOUDFLARE_CACHE_URL — https://ticketscout.co.uk/api/vividseats-cache?trigger=1
# ===========================

name: Refresh Vivid Seats Feed

on:
  schedule:
    - cron: '0 */6 * * *'  # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:         # Manual trigger from Actions tab

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Download Vivid Seats feed via FTP
        env:
          FTP_USER: ${{ secrets.IMPACT_FTP_USER }}
          FTP_PASS: ${{ secrets.IMPACT_FTP_PASS }}
        run: |
          mkdir -p public
          lftp -c "
            set ftp:ssl-allow no;
            set net:timeout 120;
            set net:max-retries 3;
            open -u \"$FTP_USER\",\"$FTP_PASS\" products.impact.com;
            get /Vivid-Seats/Ticket-Feed_CUSTOM.csv.gz -o public/vividseats-feed.csv.gz;
            bye
          "
          echo "Downloaded: $(du -h public/vividseats-feed.csv.gz | cut -f1)"

      - name: Verify download
        run: |
          if [ ! -f public/vividseats-feed.csv.gz ]; then
            echo "ERROR: Feed file not found"
            exit 1
          fi
          SIZE=$(stat -c%s public/vividseats-feed.csv.gz)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small (${SIZE} bytes)"
            exit 1
          fi
          echo "Feed OK: $(du -h public/vividseats-feed.csv.gz | cut -f1)"

      - name: Commit updated feed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vividseats-feed.csv.gz
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: refresh Vivid Seats feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi

      - name: Trigger Cloudflare KV rebuild
        env:
          CACHE_URL: ${{ secrets.CLOUDFLARE_CACHE_URL }}
        run: |
          echo "Triggering KV cache rebuild..."
          RESPONSE=$(curl -s --max-time 60 "$CACHE_URL")
          echo "Response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"success":true'; then
            echo "✓ Cache rebuilt successfully"
          else
            echo "⚠ Cache rebuild response unexpected — check above"
          fi
