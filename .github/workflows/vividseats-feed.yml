name: Refresh Vivid Seats Feed

on:
  schedule:
    - cron: '0 */6 * * *'   # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
  workflow_dispatch:

jobs:
  refresh-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Install lftp
        run: sudo apt-get update -q && sudo apt-get install -y lftp

      - name: Download Vivid Seats feed
        env:
          FTP_USER: ${{ secrets.IMPACT_FTP_USER }}
          FTP_PASS: ${{ secrets.IMPACT_FTP_PASS }}
        run: |
          mkdir -p public
          # Write lftp script to file to avoid shell interpolation issues with special chars
          cat > /tmp/lftp_script.txt << 'SCRIPT'
          set ftp:ssl-allow no
          set ftp:passive-mode yes
          set xfer:clobber yes
          set net:timeout 120
          set net:max-retries 3
          SCRIPT
          echo "open -u \"$FTP_USER\",\"$FTP_PASS\" products.impact.com" >> /tmp/lftp_script.txt
          echo "get /Vivid-Seats/Ticket-Feed_CUSTOM.csv.gz -o public/vividseats-feed.csv.gz" >> /tmp/lftp_script.txt
          echo "bye" >> /tmp/lftp_script.txt

          lftp -f /tmp/lftp_script.txt
          rm /tmp/lftp_script.txt

          ls -lh public/vividseats-feed.csv.gz

      - name: Verify download
        run: |
          if [ ! -f public/vividseats-feed.csv.gz ]; then
            echo "ERROR: File missing"; exit 1
          fi
          SIZE=$(stat -c%s public/vividseats-feed.csv.gz)
          if [ "$SIZE" -lt 1000000 ]; then
            echo "ERROR: File too small (${SIZE} bytes)"; exit 1
          fi
          echo "OK: $(du -h public/vividseats-feed.csv.gz | cut -f1)"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/vividseats-feed.csv.gz
          if git diff --staged --quiet; then
            echo "No changes to commit — feed unchanged since last run"
            exit 0
          fi
          git commit -m "chore: refresh VS feed [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          # Retry with rebase: other bots (discover-pages Trees API commits,
          # regenerate sweeps, manual deploys) can land commits during the
          # download window. A plain push then fails non-fast-forward.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"; exit 0
            fi
            echo "Push rejected (attempt $attempt) — rebasing on latest main"
            git pull --rebase origin main
          done
          echo "ERROR: push failed after 3 attempts"; exit 1

      - name: Rebuild Cloudflare KV cache
        env:
          CACHE_URL: ${{ secrets.CLOUDFLARE_CACHE_URL }}
        run: |
          if [ -z "$CACHE_URL" ]; then
            echo "WARNING: CLOUDFLARE_CACHE_URL secret not set — skipping cache rebuild"
            exit 0
          fi
          RESP=$(curl -sf --max-time 60 "$CACHE_URL" || echo '{"error":"curl failed"}')
          echo "$RESP" | head -c 300
          echo "$RESP" | grep -q '"success":true' && echo "Cache OK" || echo "Cache rebuild check response above"
