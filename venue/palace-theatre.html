<body>

    <h1>Palace Theatre Tickets</h1>
    <p>Palace Theatre is one of London's premier West End venues on Cambridge Circus, currently home to Harry Potter and the Cursed Child. Compare ticket prices from verified sellers.</p>
  </noscript>
  <script>
  (async function() {
    try {
      const r = await fetch('/venue.html');
      const html = await r.text();
      const m = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
      if (!m) return;
      document.body.innerHTML = m[1];
      document.body.querySelectorAll('script').forEach(function(o) {
        var s = document.createElement('script');
        if (o.src) s.src = o.src; else s.textContent = o.textContent;
        document.body.appendChild(s); o.remove();
      });
    } catch(e) { console.error('Failed to load venue template:', e); }
  })();
  </script>
</body>
