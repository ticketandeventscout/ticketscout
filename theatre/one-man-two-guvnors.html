<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Compare One Man Two Guvnors ticket prices across verified sellers. Find the cheapest One Man Two Guvnors theatre tickets and buy direct. Updated daily." />
  <meta property="og:title" content="One Man Two Guvnors Tickets | TicketScout" />
  <meta property="og:description" content="Compare One Man Two Guvnors ticket prices across verified sellers. Find the best deal." />
  <meta property="og:type" content="website" />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://www.ticketscout.co.uk/theatre/one-man-two-guvnors" />
  <script>window.__THEATRE_SLUG__ = 'one-man-two-guvnors';</script>
  <link rel="stylesheet" href="/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body><script>
  (async function() {
    try {
      const r = await fetch('/theatre.html');
      const html = await r.text();
      const sm = html.match(/<style>([\s\S]*?)<\/style>/i);
      if (sm) { var st = document.createElement('style'); st.textContent = sm[1]; document.head.appendChild(st); }
      const m = html.match(/<body[^>]*>([\s\S]*)<\/body>/i);
      if (!m) return;
      document.body.innerHTML = m[1];
      document.body.querySelectorAll('script').forEach(function(o) {
        var s = document.createElement('script');
        if (o.src) s.src = o.src; else s.textContent = o.textContent;
        document.body.appendChild(s); o.remove();
      });
    } catch(e) { console.error('Failed to load theatre template:', e); }
  })();
</script></body></html>
